spring.application.name=employeerestdemo

server.port=9999
#Give the database details

# ==========================================
# MySQL DATABASE CONFIGURATION
# ==========================================
# Connection URL (replace 'your_database_name' with your actual database name)
spring.datasource.url=jdbc:mysql://localhost:3306/training?useSSL=false&serverTimezone=UTC

# Database Credentials
spring.datasource.username=root
spring.datasource.password=root

# JDBC Driver (Optional for modern Spring Boot versions, as it is auto-detected)
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ==========================================
# JPA / HIBERNATE CONFIGURATION
# ==========================================
# DDL Auto-generation: options include none, update, validate, create, create-drop
spring.jpa.hibernate.ddl-auto=update

# Show SQL queries in the console log
spring.jpa.show-sql=true

# Optional: Format SQL queries to make them readable in logs
spring.jpa.properties.hibernate.format_sql=true


